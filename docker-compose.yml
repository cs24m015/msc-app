services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    expose:
      - "8000"
    depends_on:
      - mongo
      - opensearch
    networks:
      - default
      - dmz00

  frontend:
    build:
      context: ./frontend
      target: runtime
    environment:
      - VITE_API_BASE_URL=/api
    expose:
      - "4173"
    depends_on:
      - backend
    networks:
      - default
      - dmz00

  frontend-build:
    build:
      context: ./frontend
      target: dev
    entrypoint: ["/usr/local/bin/frontend-entrypoint"]
    volumes:
      - ./frontend:/workspace
    environment:
      - VITE_API_BASE_URL=/api
      - WORKSPACE=/workspace
    networks:
      - default

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    networks:
      - default

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=chAng3me!d!An0w
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"
      - "9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - default

networks:
  dmz00:
    name: dmz00
    external: true

volumes:
  mongo-data:
  opensearch-data:
