name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}

jobs:
  # ── SonarQube code analysis (all triggers) ──────────────────────────
  SonarQubeAnalysis:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}
        with:
          args: >
            -Dsonar.projectVersion=0.1.0
            -Dsonar.projectKey=msc-app

  # ── Build and push Docker images (main only) ───────────────────────
  BuildAndPushImages:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.BUILD_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: runtime
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Hecate scan on built images + SonarQube upload (main only) ─────
  HecateImageScan:
    name: Hecate Image Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: BuildAndPushImages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan backend image via Hecate
        id: scan-backend
        uses: ./actions/hecate-scan
        with:
          hecate-url: ${{ secrets.HECATE_URL }}
          api-key: ${{ secrets.SCA_API_KEY }}
          target: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}/backend:latest
          type: container_image
          scanners: trivy,grype,syft,hecate
          sonarqube-export: true
          sonarqube-output-file: hecate-backend-sonar.json
          commit-sha: ${{ github.sha }}
          branch: ${{ github.ref_name }}

      - name: Scan frontend image via Hecate
        id: scan-frontend
        uses: ./actions/hecate-scan
        with:
          hecate-url: ${{ secrets.HECATE_URL }}
          api-key: ${{ secrets.SCA_API_KEY }}
          target: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}/frontend:latest
          type: container_image
          scanners: trivy,grype,syft,hecate
          sonarqube-export: true
          sonarqube-output-file: hecate-frontend-sonar.json
          commit-sha: ${{ github.sha }}
          branch: ${{ github.ref_name }}

      - name: Merge SonarQube reports
        run: |
          jq -s '{ issues: map(.issues) | add }' \
            hecate-backend-sonar.json hecate-frontend-sonar.json \
            > hecate-sonar-combined.json
          echo "Merged $(jq '.issues | length' hecate-sonar-combined.json) issues"

      - name: Upload findings to SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}
        run: |
          wget -qO sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip
          unzip -q sonar-scanner-cli.zip
          SCANNER_BIN=$(find sonar-scanner-* -name sonar-scanner -type f | head -1)
          "$SCANNER_BIN" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.projectKey=msc-app \
            -Dsonar.sources=. \
            -Dsonar.externalIssuesReportPaths="hecate-sonar-combined.json"

  # ── Hecate source scan for PRs + SonarQube upload ──────────────────
  HecateSourceScan:
    name: Hecate Source Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archive
        id: archive
        run: |
          zip -r /tmp/source.zip . \
            -x ".git/*" "node_modules/*" "dist/*" "build/*" "__pycache__/*" ".venv/*"
          echo "archive=$(base64 -w0 /tmp/source.zip)" >> "$GITHUB_OUTPUT"
          echo "Archive size: $(du -h /tmp/source.zip | cut -f1)"

      - name: Scan source via Hecate
        id: scan-source
        uses: ./actions/hecate-scan
        with:
          hecate-url: ${{ secrets.HECATE_URL }}
          api-key: ${{ secrets.SCA_API_KEY }}
          target: ${{ github.server_url }}/${{ github.repository }}
          type: source_repo
          scanners: trivy,grype,syft,hecate,semgrep,trufflehog
          source-archive: ${{ steps.archive.outputs.archive }}
          sonarqube-export: true
          sonarqube-output-file: hecate-sonar-issues.json
          fail-on: critical
          commit-sha: ${{ github.event.pull_request.head.sha }}
          branch: ${{ github.head_ref }}

      - name: Upload findings to SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}
        run: |
          wget -qO sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip
          unzip -q sonar-scanner-cli.zip
          SCANNER_BIN=$(find sonar-scanner-* -name sonar-scanner -type f | head -1)
          "$SCANNER_BIN" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.projectKey=msc-app \
            -Dsonar.sources=. \
            -Dsonar.externalIssuesReportPaths="hecate-sonar-issues.json" \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}
