on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

name: SonarQube & Trivy Scan

jobs:
  Analysis:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checking out
      uses: actions/checkout@master
      with:
        fetch-depth: 0  # Disabling shallow clone for better reporting relevance
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}
      with:
        args: >
          -Dsonar.projectVersion=0.1.0
          -Dsonar.projectKey=msc-app

  ScanDeps:
    name: Trivy Scan
    stage: scan
    image:
      name: ubuntu:24.04
    steps:
    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        apt-get update
        apt-get install trivy
        trivy plugin install github.com/umax/trivy-plugin-sonarqube
    - name: Scan Code with Trivy
      run: |
        trivy fs --security-checks=vuln --vuln-type=library --exit-code=0 --format=json --output=trivy-deps-report.json .
        trivy sonarqube trivy-deps-report.json > sonar-deps-report.json
    - name: Upload Trivy and SonarQube Reports
      uses: actions/upload-artifact@v3
      with:
        name: trivy-sonarqube-reports
        path: |
          trivy-deps-report.json
          sonar-deps-report.json

  ScanCode:
    name: Scan Trivy Report with SonarScanner
    stage: scan
    runs-on: ubuntu-latest
    needs:
      - ScanDeps
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Trivy/SonarQube Reports
      uses: actions/download-artifact@v3
      with:
        name: trivy-sonarqube-reports

    - name: Install SonarScanner CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget
        wget -qO sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip
        unzip sonar-scanner-cli.zip
        mv sonar-scanner-7.3.0.5189-linux-x64 /opt/sonar-scanner
        sudo ln -s /opt/sonar-scanner/bin/sonar-scanner /usr/local/bin/sonar-scanner
        sonar-scanner --version

    - name: Run SonarScanner
      env:
        SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}
      run: |
        sonar-scanner \
          -Dsonar.host.url="$SONAR_HOST_URL" \
          -Dsonar.login="$SONAR_TOKEN" \
          -Dsonar.projectKey=msc-app \
          -Dsonar.sources=. \
          -Dsonar.externalIssuesReportPaths="sonar-deps-report.json"