on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

name: Build and Push Container Images

jobs:
  BuildAndPushImages:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Gitea Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.GITEA_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.BUILD_TOKEN }}

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.GITEA_REGISTRY }}/${{ github.repository }}/backend
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Grype to check backend image for vulnerabilities
      uses: anchore/scan-action@v3
      continue-on-error: true
      with:
        image: ${{ env.GITEA_REGISTRY }}/${{ github.repository }}/backend:latest
        fail-build: false
        severity-cutoff: high

    - name: Upload Grype results for backend
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}
        category: grype-backend

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.GITEA_REGISTRY }}/${{ github.repository }}/frontend
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        target: runtime
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Grype to check frontend image for vulnerabilities
      uses: anchore/scan-action@v3
      continue-on-error: true
      with:
        image: ${{ env.GITEA_REGISTRY }}/${{ github.repository }}/frontend:latest
        fail-build: false
        severity-cutoff: high

    - name: Upload Grype results for frontend
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}
        category: grype-frontend

    # Scan images via Hecate SCA API (optional, requires HECATE_URL and SCA_API_KEY secrets)
    - name: Scan backend image via Hecate
      if: ${{ secrets.HECATE_URL != '' && secrets.SCA_API_KEY != '' }}
      continue-on-error: true
      run: |
        curl -sS -X POST "${{ secrets.HECATE_URL }}/api/v1/scans" \
          -H "X-API-Key: ${{ secrets.SCA_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "target": "${{ env.GITEA_REGISTRY }}/${{ github.repository }}/backend:latest",
            "type": "container_image",
            "scanners": ["trivy", "grype", "syft"],
            "commitSha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "pipelineUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "source": "ci_cd"
          }'

    - name: Scan frontend image via Hecate
      if: ${{ secrets.HECATE_URL != '' && secrets.SCA_API_KEY != '' }}
      continue-on-error: true
      run: |
        curl -sS -X POST "${{ secrets.HECATE_URL }}/api/v1/scans" \
          -H "X-API-Key: ${{ secrets.SCA_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "target": "${{ env.GITEA_REGISTRY }}/${{ github.repository }}/frontend:latest",
            "type": "container_image",
            "scanners": ["trivy", "grype", "syft"],
            "commitSha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "pipelineUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "source": "ci_cd"
          }'